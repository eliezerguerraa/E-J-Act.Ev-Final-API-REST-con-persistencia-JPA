# =============================================
# Configuración de base de datos MySQL
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3308/musica_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# Configuración JPA / Hibernate
# =============================================
# create-drop: recrea las tablas cada vez que arranca (útil en desarrollo)
# update: mantiene los datos entre reinicios
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# =============================================
# Puerto del servidor
# =============================================
server.port=8080
